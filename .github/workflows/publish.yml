# Publishes the package to PyPI when you publish a GitHub Release.
#
# This uses PyPI "Trusted Publishing" (OIDC) — no API tokens or passwords are
# stored in GitHub. To enable it (one-time setup):
#
#   1. Build/publish once is NOT required first — PyPI supports "pending"
#      publishers for brand-new projects.
#   2. Go to https://pypi.org/manage/account/publishing/
#   3. Under "Add a new pending publisher", fill in:
#        PyPI Project Name:  arabic-rag-kit
#        Owner:              <your-github-username-or-org>   (e.g. GBMUAE)
#        Repository name:    arabic-rag-kit
#        Workflow name:      publish.yml
#        Environment name:   pypi
#   4. Save. From then on, publishing a GitHub Release runs this workflow and
#      PyPI trusts it via OIDC — nothing secret to manage.
#
# The `environment: pypi` below must match the Environment name you entered.

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # REQUIRED for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
